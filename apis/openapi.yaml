openapi: 3.0.3
info:
  title: LegalHub API Orchestrator
  version: 1.0.0
  description: >
    API documentation for the LegalHub Conversational RAG platform. 
    Handles user authentication, query vectorization via Hugging Face, FAISS semantic retrieval, 
    Llama-3 generative synthesis via Groq Cloud, and RLHF telemetry logging. 

servers:
  - url: http://localhost:8000
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Valid JSON Web Token (JWT) required to authorize inference and telemetry requests."

  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: "User's email address."
        password:
          type: string
          format: password
          description: "Plain text password, to be securely hashed using AES-256 before database insertion."

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: "JWT access token returned upon successful credential verification."
        token_type:
          type: string
          example: "bearer"
        user_id:
          type: string
          format: uuid
          description: "UUID mapping to the users table in PostgreSQL. "

    ChatRequest:
      type: object
      required:
        - query
        - mode
      properties:
        query:
          type: string
          maxLength: 500
          description: "User's natural language input prompt. Strictly restricted to a maximum of 500 characters to prevent context-window overflow during RAG."
        mode:
          type: string
          enum: [Citizen, Professional]
          description: "UI state toggle. Dictates whether text is routed through the STS translation pipeline (Citizen) or kept exact (Professional)."

    FeedbackRequest:
      type: object
      required:
        - retrieved_provision_id
        - user_prompt
        - llama_response
        - is_helpful
      properties:
        retrieved_provision_id:
          type: string
          format: uuid
          description: "Foreign key mapping to the retrieved provision in PostgreSQL. "
        user_prompt:
          type: string
          description: "The sanitized user query. "
        llama_response:
          type: string
          description: "The text generated by the Llama-3 model. "
        is_helpful:
          type: boolean
          description: "Boolean mapping to the user's thumbs up/down interaction."

paths:
  /api/auth/register:
    post:
      summary: User Registration
      description: "Creates a new user profile in the Neon.tech PostgreSQL database. Passwords are cryptographically hashed."
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User successfully created.
        '400':
          description: Bad Request (e.g., Email already exists).

  /api/auth/login:
    post:
      summary: User Authentication
      description: "Validates credentials against PostgreSQL and issues a JSON Web Token (JWT) to protect generative API endpoints. [cite: 116, 295, 393]"
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login. Returns JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized (Invalid credentials).

  /api/chat:
    post:
      summary: Conversational RAG Inference (Streaming)
      description: >
        Executes PII scrubbing and prompt-injection checks. Vectorizes the query into a 1x768 array via Hugging Face API, 
        retrieves top-5 provisions from FAISS (k=5), and translates text via STS if "Citizen Mode" is active. 
        Assembles prompt and streams Llama-3 response via Groq API. 
      tags:
        - Inference
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: "Server-Sent Events (SSE) stream of generated text tokens concluding with LSK-formatted citations and raw text metadata for the UI transparency accordion."
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: "Bad Request. Triggers Zero-Generation Abort returning 'Out of Scope' if FAISS Max Similarity score is < 0.70."
        '401':
          description: "Unauthorized. Missing or invalid Bearer JWT."

  /api/feedback:
    post:
      summary: RLHF Telemetry Logger
      description: "Asynchronously logs explicit user UI feedback (is_helpful) alongside the prompt and generation data to the PostgreSQL `rlhf_feedback` table. Tied securely to the authenticated user_id."
      tags:
        - Telemetry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '201':
          description: "Feedback securely inserted into PostgreSQL database."
        '401':
          description: "Unauthorized. Missing or invalid Bearer JWT."