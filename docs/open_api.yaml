openapi: 3.0.3
info:
  title: LegalHub API Orchestrator
  version: 1.0.0
  description: >
    API documentation for the LegalHub Conversational RAG platform. 
    Handles JWT authentication, vector retrieval, LLM synthesis, and RLHF telemetry.
    [Achieves Requirement COMM.1.1]

servers:
  - url: http://localhost:8000
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Valid JWT token required for inference and telemetry. [Achieves Requirement SEC.7]

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: "bearer"
        user_id:
          type: string
          format: uuid

    ChatRequest:
      type: object
      required:
        - query
        - mode
      properties:
        query:
          type: string
          maxLength: 500
          description: "User's legal question. Max 500 chars to prevent context overflow. [Achieves Requirement P.1.4]"
        mode:
          type: string
          enum: [Citizen, Professional]
          description: "Dictates STS routing and LLM system prompt. [Achieves Requirement U.1.1]"

    FeedbackRequest:
      type: object
      required:
        - prompt_text
        - generated_response
        - retrieved_provision_ids
        - is_helpful
      properties:
        prompt_text:
          type: string
        generated_response:
          type: string
        retrieved_provision_ids:
          type: array
          items:
            type: string
            format: uuid
        is_helpful:
          type: boolean

paths:
  /api/auth/login:
    post:
      summary: User Authentication
      description: Validates credentials against PostgreSQL and returns a JWT. [Achieves Requirement Security Functions Module]
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Unauthorized (Invalid credentials)

  /api/chat:
    post:
      summary: Conversational RAG Endpoint (Streaming)
      description: >
        Executes query vectorization, FAISS retrieval (k=5), STS translation (if Citizen mode), 
        and streams Llama-3 response via Server-Sent Events (SSE).
        [Achieves Requirements F.3.1, F.3.2]
      tags:
        - Inference
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: SSE Stream of generated text tokens followed by citation metadata. [Achieves Requirement COMM 1.3]
          content:
            text/event-stream:
              schema:
                type: string
                description: "Streamed chunks concluding with metadata object."
        '400':
          description: Zero-Generation Abort triggered (Max Similarity < 0.70). [Achieves Requirement REL.2]
        '401':
          description: Missing or invalid JWT token.

  /api/feedback:
    post:
      summary: RLHF Telemetry Logger
      description: Asynchronously logs user UI feedback to the PostgreSQL preference_dataset tied to the authenticated user_id. [Achieves Requirement SEC.2, SEC.7]
      tags:
        - Telemetry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '201':
          description: Feedback securely logged.
        '401':
          description: Missing or invalid JWT token.